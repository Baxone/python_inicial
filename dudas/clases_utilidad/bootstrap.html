<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Carrusel Bootstrap 5.3</title>
		<link
			href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
			rel="stylesheet"
			integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
			crossorigin="anonymous"
		/>
		<style>
			body {
				background-color: #f8f9fa;
			}

			.carousel-wrapper {
				max-width: 900px;
			}

			.carousel-item img {
				height: 480px;
				object-fit: cover;
			}
		</style>
	</head>
	<body>
		<main class="container py-5">
			<h1 class="text-center mb-4">Carrusel con Bootstrap 5.3</h1>

			<div class="carousel-wrapper mx-auto">
				<div id="carruselFotos" class="carousel slide" data-bs-ride="carousel">
					<div class="carousel-indicators">
						<button
							type="button"
							data-bs-target="#carruselFotos"
							data-bs-slide-to="0"
							class="active"
							aria-current="true"
							aria-label="Slide 1"
						></button>
						<button
							type="button"
							data-bs-target="#carruselFotos"
							data-bs-slide-to="1"
							aria-label="Slide 2"
						></button>
						<button
							type="button"
							data-bs-target="#carruselFotos"
							data-bs-slide-to="2"
							aria-label="Slide 3"
						></button>
					</div>

					<div class="carousel-inner rounded shadow">
						<div class="carousel-item active">
							<img
								src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=1400&q=80"
								class="d-block w-100"
								alt="Paisaje de montanas"
							/>
						</div>
						<div class="carousel-item">
							<img
								src="https://images.unsplash.com/photo-1493244040629-496f6d136cc3?auto=format&fit=crop&w=1400&q=80"
								class="d-block w-100"
								alt="Bosque con lago"
							/>
						</div>
						<div class="carousel-item">
							<img
								src="https://images.unsplash.com/photo-1469474968028-56623f02e42e?auto=format&fit=crop&w=1400&q=80"
								class="d-block w-100"
								alt="Carretera entre montanas"
							/>
						</div>
					</div>

					<button
						class="carousel-control-prev"
						type="button"
						data-bs-target="#carruselFotos"
						data-bs-slide="prev"
					>
						<span class="carousel-control-prev-icon" aria-hidden="true"></span>
						<span class="visually-hidden">Anterior</span>
					</button>
					<button
						class="carousel-control-next"
						type="button"
						data-bs-target="#carruselFotos"
						data-bs-slide="next"
					>
						<span class="carousel-control-next-icon" aria-hidden="true"></span>
						<span class="visually-hidden">Siguiente</span>
					</button>
				</div>
			</div>
		</main>

		<script
			src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
			integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
			crossorigin="anonymous"
		></script>
	</body>
</html>
